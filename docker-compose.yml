# =============================================================================
# PROJECT ANTIGRAVITY — Single-Service Compose
# =============================================================================
# The generated root .env is the only supported runtime config file.
# Compose auto-loads it, which means ${APP_PORT} below resolves from .env
# and the container also receives every entry in .env via env_file.
# =============================================================================

services:
  antigravity:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      # Container internals — not user-configurable.
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      # Node 18 ships a global fetch(), so we don't need curl in the image.
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/v1/status/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped
